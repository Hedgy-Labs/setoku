# SPDX-License-Identifier: Apache-2.0
#
# Setoku — the whole system on one box (README Figure 1).
#
# Core services (caddy, server, postgres) have no profile: they always run.
# Optional profiles:
#   lake    → clickhouse                 (the bundled lake)
#   ingest  → vector (+ lake implied)    (log/event receiver; slack-listener lands in Phase 3)
#   backup  → clickhouse-backup, rclone  (one-shots driven by deploy/backup/*.sh)
# Enable in .env:  COMPOSE_PROFILES=lake,ingest
#
# Images are pinned by multi-arch manifest-list digest (arm64 prototype box,
# x86 Hetzner path both covered). Refresh digests deliberately, per release.
#
# Invariant I1: only caddy publishes ports. Postgres/ClickHouse/Vector/server
# listen on the compose network only.

# Project name — override with SETOKU_STACK to run a second, fully isolated stack
# on the same box (its own containers, network, and volumes) for testing. Default
# keeps the production stack named "setoku".
name: ${SETOKU_STACK:-setoku}

# Bound every container's log so a chatty service can't quietly fill the disk —
# Docker's json-file driver is UNLIMITED by default. 20 MB × 3 files per
# container. Wired into each service below via `logging: *default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SETOKU_EDGE_HTTP_PORT:-80}:80"
      - "${SETOKU_EDGE_HTTPS_PORT:-443}:443"
      - "${SETOKU_EDGE_HTTPS_PORT:-443}:443/udp" # HTTP/3
    environment:
      SETOKU_DOMAIN: ${SETOKU_DOMAIN:-localhost}
      # optional second hostname served by the same site (cert issued too) —
      # e.g. an old sslip.io domain kept alive while migrating to a real domain
      SETOKU_ALT_DOMAIN: ${SETOKU_ALT_DOMAIN:-}
      SETOKU_INGEST_TOKEN: "${SETOKU_INGEST_TOKEN:?generate one with openssl rand -hex 24}"
      # Vercel drain endpoint-verification value (echoed on /ingest/* — see Caddyfile)
      SETOKU_VERCEL_VERIFY: ${SETOKU_VERCEL_VERIFY:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Box-local extra site blocks, imported by the Caddyfile. Survives deploys
      # (not rsynced) and recreates. A directory mount, so added files show on the
      # next recreate. Absent dir → import is a no-op (Caddyfile handles it).
      - ./caddy.d:/etc/caddy/conf.d:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      SETOKU_TOKENS: "${SETOKU_TOKENS:?per-user MCP tokens, e.g. tok1=alice@co.com}"
      # Hot-pluggable analyst tokens on the data volume: `admin-cli add-teammate`
      # appends here so inviting a teammate is one command + restart, no .env edit.
      SETOKU_TOKENS_FILE: ${SETOKU_TOKENS_FILE:-/data/teammates.json}
      # curator tokens (commit curated knowledge, blocked from the lake) for
      # /setoku:generate + /setoku:curate — optional; mint with admin-cli.
      SETOKU_CURATOR_TOKENS: ${SETOKU_CURATOR_TOKENS:-}
      # janitor tokens (auto-draft/auto-reject the corrections queue) — draft +
      # reject ONLY, both granting zero authority. Optional; powers the cockpit's
      # drafting cadence (curation-cockpit-spec). Never accept/upsert.
      SETOKU_JANITOR_TOKENS: ${SETOKU_JANITOR_TOKENS:-}
      SETOKU_DATABASE_URL: ${SETOKU_DATABASE_URL:-}
      SETOKU_PUBLIC_URL: https://${SETOKU_DOMAIN:-localhost}
      SETOKU_HEALTHZ_PING: ${SETOKU_HEALTHZ_PING:-}
      # run_query dialect "clickhouse" (I5) — connects as the read-only
      # engine-constrained user (deploy/clickhouse/lake-users.xml), NOT the
      # full-privilege ingest user. NB: secrets here should be URL-safe
      # (openssl rand -hex is) — they ride in a URL.
      SETOKU_LAKE_URL: "http://setoku_ro:${CLICKHOUSE_RO_PASSWORD}@clickhouse:8123/setoku"
    volumes:
      - setoku_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch("http://127.0.0.1:8787/health").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Context store + auth (target architecture). The v0.9 gateway still keeps
  # knowledge in SQLite on the setoku_data volume; the store migrates here
  # during the Phase 3/5 build-out. pgvector is installed but unused (I8).
  postgres:
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: setoku
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d setoku"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    logging: *default-logging
    profiles: [lake, ingest, slack, render, mercury, github, mirror]
    image: clickhouse/clickhouse-server:25.3@sha256:b627d7a9bc0e0c1bac26cdbe9d2fc6316faa29c5d8a174f28f5abd57d0fa6ba2
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-setoku}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set in .env}
      CLICKHOUSE_RO_PASSWORD: ${CLICKHOUSE_RO_PASSWORD:?set in .env}
      CLICKHOUSE_DB: setoku
    volumes:
      - ch_data:/var/lib/clickhouse
      # memory/concurrency preset: small (4–8 GB boxes) | roomy (24 GB prototype)
      - ./deploy/clickhouse/${SETOKU_CH_PRESET:-small}.xml:/etc/clickhouse-server/config.d/zz-setoku-preset.xml:ro
      # rolling TTL on ClickHouse's own telemetry tables (system.*_log) so they
      # can't outgrow the lake — see deploy/clickhouse/system-logs.xml
      - ./deploy/clickhouse/system-logs.xml:/etc/clickhouse-server/config.d/zz-setoku-system-logs.xml:ro
      # the gateway's read-only lake user (grants + settings constraints)
      - ./deploy/clickhouse/lake-users.xml:/etc/clickhouse-server/users.d/zz-setoku-lake.xml:ro
      - ./ingest/schemas:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test:
        - CMD-SHELL
        - clickhouse-client --user "$${CLICKHOUSE_USER}" --password "$${CLICKHOUSE_PASSWORD}" --query "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  vector:
    logging: *default-logging
    profiles: [ingest, render, mercury, github]
    image: timberio/vector:0.49.0-alpine@sha256:2a31648e67280953aaf6b219c1b04729ac5ed12820ec2bfb698630b2d989d135
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-setoku}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set in .env}
    volumes:
      - ./deploy/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector_buffer:/var/lib/vector # disk buffer survives restarts (I4)
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8686/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Slack workspace archiver (tasks 3.3/3.4) — Socket Mode listener, spool-first
  # durability. One-shot backfill: docker compose run --rm slack-listener bun backfill.ts
  # Start it as soon as the app exists: the free-plan ~90-day window is burning.
  slack-listener:
    logging: *default-logging
    profiles: [slack]
    build:
      context: .
      dockerfile: ingest/slack-listener/Dockerfile
    restart: unless-stopped
    environment:
      # listener refuses to start without the app token (see its README) — kept
      # optional here so non-slack deploys don't have to define it
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-setoku}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set in .env}
      CLICKHOUSE_DB: setoku
      SETOKU_SPOOL_DIR: /spool
      SLACK_BACKFILL_CHANNELS: ${SLACK_BACKFILL_CHANNELS:-}
    volumes:
      - slack_spool:/spool # spooled events survive container replacement (I4)
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch("http://127.0.0.1:8686/health").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Render Logs → ingest bridge (profile: render). Render has no API to create
  # a pushed log stream, but its Logs query API works — so we pull. Polls the
  # configured services and POSTs to Vector's /ingest/render on the internal
  # network. State on a volume so restarts don't re-ingest.
  render-poller:
    logging: *default-logging
    profiles: [render]
    build:
      context: .
      dockerfile: ingest/render-poller/Dockerfile
    restart: unless-stopped
    environment:
      # poll.ts validates these at runtime; keep :- defaults so `docker compose
      # config` validates without them (they're only needed when the render
      # profile actually runs), matching the slack-listener pattern.
      RENDER_API_KEY: ${RENDER_API_KEY:-}
      RENDER_OWNER_ID: ${RENDER_OWNER_ID:-}
      RENDER_SERVICE_IDS: ${RENDER_SERVICE_IDS:-}
      RENDER_POLL_INTERVAL_MS: ${RENDER_POLL_INTERVAL_MS:-60000}
    volumes:
      - render_state:/state
    depends_on:
      vector:
        condition: service_healthy

  # Mercury Bank → ingest bridge (profile: mercury). Mercury is API-only with no
  # self-create push stream, so we poll: balance snapshots + a rolling window of
  # transactions (ReplacingMergeTree handles pending→posted updates). State on a
  # volume so restarts don't re-backfill. See ingest/mercury-poller/README.md.
  mercury-poller:
    logging: *default-logging
    profiles: [mercury]
    build:
      context: .
      dockerfile: ingest/mercury-poller/Dockerfile
    restart: unless-stopped
    environment:
      # poll.ts validates the token at runtime; :- default keeps `docker compose
      # config` valid for non-mercury deploys (matches render-poller/slack).
      MERCURY_API_TOKEN: ${MERCURY_API_TOKEN:-}
      MERCURY_POLL_INTERVAL_MS: ${MERCURY_POLL_INTERVAL_MS:-300000}
      MERCURY_WINDOW_DAYS: ${MERCURY_WINDOW_DAYS:-35}
      MERCURY_BACKFILL_DAYS: ${MERCURY_BACKFILL_DAYS:-730}
    volumes:
      - mercury_state:/state
    depends_on:
      vector:
        condition: service_healthy

  # GitHub → ingest bridge (profile: github). Pull-based like Mercury: webhooks
  # exist but a poller gets full-history backfill and needs no public endpoint.
  # Polls issues/PRs/commits/comments for the GITHUB_REPOS list and POSTs to
  # Vector's /ingest/github/* on the internal network. Mutable objects land in
  # ReplacingMergeTree tables. State on a volume so restarts don't re-backfill.
  github-poller:
    logging: *default-logging
    profiles: [github]
    build:
      context: .
      dockerfile: ingest/github-poller/Dockerfile
    restart: unless-stopped
    environment:
      # poll.ts validates these at runtime; :- defaults keep `docker compose
      # config` valid for non-github deploys (matches render/mercury pollers).
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOS: ${GITHUB_REPOS:-}
      GITHUB_POLL_INTERVAL_MS: ${GITHUB_POLL_INTERVAL_MS:-300000}
      GITHUB_BACKFILL_DAYS: ${GITHUB_BACKFILL_DAYS:-730}
    volumes:
      - github_state:/state
    depends_on:
      vector:
        condition: service_healthy

  # Business-DB → lake mirror (profile: mirror, issue #47). Full-reloads every
  # allowlisted Postgres table into ClickHouse `biz.*` on a poller-style loop
  # (staging table + atomic EXCHANGE swap), using the SAME read-only role the
  # gateway queries with — the allow/deny list is inherited, a denied table
  # never leaves prod. Heavy app panels read the mirror by default; see
  # ingest/pg-mirror/README.md. Stateless: every run is a full reload.
  # NB the allow/deny config is baked at build like the server image — after
  # editing .setoku/config.json rebuild BOTH: up -d --build server pg-mirror.
  pg-mirror:
    logging: *default-logging
    profiles: [mirror]
    build:
      context: .
      dockerfile: ingest/pg-mirror/Dockerfile
    restart: unless-stopped
    environment:
      # mirror.ts validates this at runtime; :- default keeps `docker compose
      # config` valid for non-mirror deploys (matches the other connectors).
      SETOKU_DATABASE_URL: ${SETOKU_DATABASE_URL:-}
      SETOKU_MIRROR_INTERVAL_MS: ${SETOKU_MIRROR_INTERVAL_MS:-900000}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-setoku}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set in .env}
      CLICKHOUSE_DB: setoku
    depends_on:
      clickhouse:
        condition: service_healthy

  # ---- backup one-shots (profile: backup) — driven by deploy/backup/*.sh ----

  clickhouse-backup:
    logging: *default-logging
    profiles: [backup]
    image: altinity/clickhouse-backup:2.6.5@sha256:d970be663360e8c4cfa1bb4cac21898e434c7bec3e196599d2b39ff55a20f841
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USER:-setoku}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set in .env}
      REMOTE_STORAGE: s3
      S3_ENDPOINT: ${SETOKU_BACKUP_S3_ENDPOINT:-}
      S3_BUCKET: ${SETOKU_BACKUP_S3_BUCKET:-}
      S3_ACCESS_KEY: ${SETOKU_BACKUP_S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${SETOKU_BACKUP_S3_SECRET_KEY:-}
      S3_PATH: clickhouse
      S3_FORCE_PATH_STYLE: "true"
      BACKUPS_TO_KEEP_REMOTE: "14"
      # biz.* is the pg-mirror of the business DB — re-derivable from prod, so
      # it stays OUT of the backup (I4); system/information_schema are the
      # tool's defaults, restated because setting the var replaces them.
      CLICKHOUSE_SKIP_TABLES: "system.*,INFORMATION_SCHEMA.*,information_schema.*,_temporary_and_external_tables.*,biz.*"
    volumes:
      - ch_data:/var/lib/clickhouse

  rclone:
    logging: *default-logging
    profiles: [backup]
    image: rclone/rclone:1.69@sha256:1f497a86a6466395e62a5886613a14b7b18809543566ef9fa35fa1371a7ecc0f
    environment:
      RCLONE_CONFIG_REMOTE_TYPE: s3
      RCLONE_CONFIG_REMOTE_PROVIDER: ${SETOKU_BACKUP_S3_PROVIDER:-Other}
      RCLONE_CONFIG_REMOTE_ENDPOINT: ${SETOKU_BACKUP_S3_ENDPOINT:-}
      RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID: ${SETOKU_BACKUP_S3_ACCESS_KEY:-}
      RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY: ${SETOKU_BACKUP_S3_SECRET_KEY:-}
    volumes:
      - ./backups:/backups

volumes:
  caddy_data:
  caddy_config:
  setoku_data:
  pg_data:
  ch_data:
  vector_buffer:
  slack_spool:
  render_state:
  mercury_state:
  github_state:
