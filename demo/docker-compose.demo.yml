# SPDX-License-Identifier: Apache-2.0
#
# Setoku DEMO stack — a self-contained, throwaway Setoku instance pointed at the
# synthetic "Bonita Bulldogs" sports dataset. Runs ALONGSIDE a production Setoku
# stack on the same box without touching it: its own project name, network,
# volumes, and Postgres. The gateway reuses the already-built gateway image
# (`ghcr.io/hedgy-labs/setoku-gateway:latest` — the same tag the production
# compose builds/pulls; override with DEMO_IMAGE).
#
# Local / standalone:
#   docker compose -p setoku-demo -f docker-compose.demo.yml --env-file .env.demo up -d
# On a box that also runs production (so prod Caddy can front it), add the edge
# overlay:  -f docker-compose.edge.yml   (see boot.sh, which wires both).
#
# The gateway is published on 127.0.0.1:${DEMO_PORT} for local testing; public
# access goes through the production Caddy (docker-compose.edge.yml).

name: setoku-demo

services:
  # Business Postgres holding the synthetic sports data (the "live" DB the
  # analyst queries). Internal network only. The `.local` alias matters: the
  # gateway's db.ts forces TLS for any non-local host, and this container speaks
  # plaintext — a `.local` hostname makes db.ts skip TLS.
  demo-postgres:
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    restart: unless-stopped
    # Docker defaults a container's /dev/shm to 64MB; parallel hash joins across
    # the multi-system realistic dataset (e.g. pos.txn ⋈ ticketing.account)
    # exhaust it ("could not resize shared memory segment"). Give it room.
    shm_size: 512mb
    environment:
      POSTGRES_PASSWORD: ${DEMO_PG_PASSWORD:-demo}
      POSTGRES_DB: ${DEMO_DB:-bulldogs}
    volumes:
      - demo_pg:/var/lib/postgresql/data
    networks:
      demo_internal:
        aliases: [demo-postgres.local]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DEMO_DB:-bulldogs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The demo's own lake (ClickHouse) — target of the biz.* business-DB mirror
  # and run_query's clickhouse dialect. Internal network only (I1); reuses the
  # production ClickHouse configs (small preset, setoku_ro lake user, schemas).
  # Default passwords are fine here: synthetic data, never exposed.
  demo-clickhouse:
    image: clickhouse/clickhouse-server:25.3@sha256:b627d7a9bc0e0c1bac26cdbe9d2fc6316faa29c5d8a174f28f5abd57d0fa6ba2
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: setoku
      CLICKHOUSE_PASSWORD: ${DEMO_CH_PASSWORD:-demo}
      CLICKHOUSE_RO_PASSWORD: ${DEMO_CH_RO_PASSWORD:-demo}
      CLICKHOUSE_DB: setoku
    volumes:
      - demo_ch:/var/lib/clickhouse
      - ../deploy/clickhouse/small.xml:/etc/clickhouse-server/config.d/zz-setoku-preset.xml:ro
      - ../deploy/clickhouse/system-logs.xml:/etc/clickhouse-server/config.d/zz-setoku-system-logs.xml:ro
      - ../deploy/clickhouse/lake-users.xml:/etc/clickhouse-server/users.d/zz-setoku-lake.xml:ro
      - ../ingest/schemas:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    networks: [demo_internal]
    healthcheck:
      test:
        - CMD-SHELL
        - clickhouse-client --user setoku --password "$${CLICKHOUSE_PASSWORD}" --query "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Business-DB → lake mirror (issue #47): full-reloads the allowlisted bulldogs
  # tables into demo-clickhouse `biz.*` so heavy app panels run on the mirror
  # instead of seq-scanning demo-postgres. The dataset's .setoku (allow/deny
  # list) is bind-mounted over the baked config, so it always matches what the
  # demo gateway enforces.
  demo-pg-mirror:
    build:
      context: ..
      dockerfile: ingest/pg-mirror/Dockerfile
    restart: unless-stopped
    environment:
      SETOKU_DATABASE_URL: postgres://postgres:${DEMO_PG_PASSWORD:-demo}@demo-postgres.local:5432/${DEMO_DB:-bulldogs}
      SETOKU_MIRROR_INTERVAL_MS: ${DEMO_MIRROR_INTERVAL_MS:-900000}
      CLICKHOUSE_URL: http://demo-clickhouse:8123
      CLICKHOUSE_USER: setoku
      CLICKHOUSE_PASSWORD: ${DEMO_CH_PASSWORD:-demo}
      CLICKHOUSE_DB: setoku
    volumes:
      - ${DEMO_DATASET_DIR:-./bulldogs}/.setoku:/project/.setoku:ro
    networks: [demo_internal]
    depends_on:
      demo-postgres:
        condition: service_healthy
      demo-clickhouse:
        condition: service_healthy

  # The Setoku gateway (same image as production), pointed at the demo Postgres
  # and the sports knowledge seed. A separate /data volume keeps its knowledge
  # store isolated from production.
  demo-server:
    image: ${DEMO_IMAGE:-ghcr.io/hedgy-labs/setoku-gateway:latest}
    restart: unless-stopped
    environment:
      SETOKU_PROJECT_DIR: /demo-project
      SETOKU_DB_PATH: /data/knowledge.db
      SETOKU_DATABASE_URL: postgres://postgres:${DEMO_PG_PASSWORD:-demo}@demo-postgres.local:5432/${DEMO_DB:-bulldogs}
      # Per-user MCP tokens — "token=identity,token2=identity2" (analyst: read + propose)
      SETOKU_TOKENS: ${DEMO_TOKENS:?set DEMO_TOKENS (e.g. <hex>=demo@bulldogs) — see boot.sh}
      # Optional curator token (commit curated knowledge; cannot read the lake — I2)
      SETOKU_CURATOR_TOKENS: ${DEMO_CURATOR_TOKENS:-}
      SETOKU_PUBLIC_URL: ${DEMO_PUBLIC_URL:-http://localhost:8788}
      # Public DEMO: the web console is viewable READ-ONLY without login and shows
      # a "this is a demo" banner. Read-only — grants zero write capability (I2/I9).
      SETOKU_DEMO: ${DEMO_PUBLIC_CONSOLE:-1}
      # Optional Slack incoming webhook for activity notifications (issue #63):
      # app published/updated, and a new version deployed. Unset → off.
      SETOKU_NOTIFY_WEBHOOK: ${DEMO_NOTIFY_WEBHOOK:-}
      # The demo lake — run_query dialect "clickhouse" + the biz.* mirror.
      # Connects as the engine-constrained read-only user (I9), like prod.
      SETOKU_LAKE_URL: http://setoku_ro:${DEMO_CH_RO_PASSWORD:-demo}@demo-clickhouse:8123/setoku
    ports:
      - "127.0.0.1:${DEMO_PORT:-8788}:8787"
    volumes:
      - ${DEMO_DATASET_DIR:-./bulldogs}/.setoku:/demo-project/.setoku:ro
      - demo_data:/data
    networks: [demo_internal]
    depends_on:
      demo-postgres:
        condition: service_healthy

networks:
  demo_internal:

volumes:
  demo_pg:
  demo_data:
  demo_ch:
