# SPDX-License-Identifier: Apache-2.0
# Setoku Vector receiver (task 3.1).
#
# One authenticated HTTP source (Caddy enforces the bearer token at the edge)
# routed by ingest path into typed per-source pipelines:
#   /ingest/vercel               → logs_vercel   (NDJSON drain; schema per Vercel docs)
#   /ingest/render               → logs_render   (HTTPS JSON; schema undocumented — defensive, see 011_logs_render.sql)
#   /ingest/events               → app_events    (first-party contract: docs/events.md)
#   /ingest/mercury/accounts     → mercury_accounts      (poller balance snapshots)
#   /ingest/mercury/transactions → mercury_transactions  (poller, ReplacingMergeTree)
#   /ingest/mercury              → mercury_events         (optional webhook stream)
#   /ingest/github/issues        → github_issues   (poller; issues + PRs, ReplacingMergeTree)
#   /ingest/github/pulls         → github_pulls    (poller; PR merge/branch detail)
#   /ingest/github/commits       → github_commits  (poller; default-branch commits)
#   /ingest/github/comments      → github_comments (poller; issue + review comments)
#   /ingest/monarch/accounts     → monarch_accounts     (poller balance snapshots)
#   /ingest/monarch/networth     → monarch_net_worth    (poller; daily net worth, ReplacingMergeTree)
#   /ingest/monarch/transactions → monarch_transactions (poller, ReplacingMergeTree)
#   /ingest/monarch/budgets      → monarch_budgets      (poller; monthly budget vs actual)
#   /ingest/monarch/holdings     → monarch_holdings     (poller; investment portfolio breakdown)
#   /ingest/heartbeat            → ingest_heartbeats    (poller liveness beats — no CH creds in pollers)
#   anything else                → ingest_raw    (catch-all; nothing is silently dropped)
#
# Buffer policy (I4): app events block when the disk buffer fills (never shed
# the high-grade ore); platform request logs may drop_newest under backpressure.
# Unit tests: deploy/vector/tests.yaml (run via `vector test`, wired into CI).

api:
  enabled: true # /health used by the compose healthcheck
  address: 0.0.0.0:8686

sources:
  ingest_http:
    type: http_server
    address: 0.0.0.0:8080
    strict_path: false
    path_key: _path
    framing:
      method: newline_delimited # Vercel posts NDJSON; single JSON lines work too
    decoding:
      codec: json

transforms:
  router:
    type: route
    inputs: [ingest_http]
    route:
      vercel: '._path == "/ingest/vercel"'
      render: '._path == "/ingest/render"'
      events: '._path == "/ingest/events"'
      mercury_acct: '._path == "/ingest/mercury/accounts"'
      mercury_txn: '._path == "/ingest/mercury/transactions"'
      mercury_event: '._path == "/ingest/mercury"'
      github_issue: '._path == "/ingest/github/issues"'
      github_pull: '._path == "/ingest/github/pulls"'
      github_commit: '._path == "/ingest/github/commits"'
      github_comment: '._path == "/ingest/github/comments"'
      monarch_acct: '._path == "/ingest/monarch/accounts"'
      monarch_networth: '._path == "/ingest/monarch/networth"'
      monarch_txn: '._path == "/ingest/monarch/transactions"'
      monarch_budget: '._path == "/ingest/monarch/budgets"'
      monarch_holding: '._path == "/ingest/monarch/holdings"'
      heartbeat: '._path == "/ingest/heartbeat"'

  vercel_parse:
    type: remap
    inputs: [router.vercel]
    source: |
      del(.source_type)
      del(._path)
      raw = encode_json(.)
      ms = int(.timestamp) ?? 0
      t = now()
      if ms > 0 { t = from_unix_timestamp!(ms, unit: "milliseconds") }
      ua = ""
      ua_arr = array(.proxy.userAgent) ?? []
      if length(ua_arr) > 0 { ua = to_string(ua_arr[0]) ?? "" }
      # NB: fallbacks must branch on null — to_string/to_int coerce a MISSING
      # field infallibly (""/0), so `to_x(.a) ?? to_x(.b)` never reaches .b
      rp = .path
      if rp == null || rp == "" { rp = .proxy.path }
      status = .statusCode
      if status == null { status = .proxy.statusCode }
      . = {
        "ts": format_timestamp!(t, "%F %T%.3f"),
        "id": to_string(.id) ?? "",
        "source": to_string(.source) ?? "",
        "level": to_string(.level) ?? "",
        "project_id": to_string(.projectId) ?? "",
        "deployment_id": to_string(.deploymentId) ?? "",
        "environment": to_string(.environment) ?? "",
        "host": to_string(.host) ?? "",
        "request_path": to_string(rp) ?? "",
        "method": to_string(.proxy.method) ?? "",
        "status_code": to_int(status) ?? 0,
        "user_agent": ua,
        "message": to_string(.message) ?? "",
        "raw": raw
      }

  render_parse:
    type: remap
    inputs: [router.render]
    source: |
      # ⚠ I7: Render's JSON schema is undocumented; extract common fields
      # defensively, keep everything in raw. Tighten in task 4.3.
      del(.source_type)
      del(._path)
      raw = encode_json(.) # keeps the client's own timestamp field when present
      # null-branching fallbacks — see the note in vercel_parse
      tsrc = .timestamp
      if tsrc == null { tsrc = .ts }
      del(.timestamp)
      # empty string counts as missing too — the http_server harness (and some
      # producers) emit message: ""
      svc = .service
      if svc == null || svc == "" { svc = .serviceName }
      if svc == null || svc == "" { svc = .app }
      inst = .instance
      if inst == null || inst == "" { inst = .instanceId }
      msg = .message
      if msg == null || msg == "" { msg = .log }
      if msg == null || msg == "" { msg = .line }
      lvl = .level
      if lvl == null || lvl == "" { lvl = "info" }
      t, terr = parse_timestamp(to_string(tsrc) ?? "", "%+")
      if terr != null { t = now() }
      . = {
        "ts": format_timestamp!(t, "%F %T%.3f"),
        "service": to_string(svc) ?? "",
        "instance": to_string(inst) ?? "",
        "level": downcase(to_string(lvl) ?? "info"),
        "type": to_string(.type) ?? "",
        "message": to_string(msg) ?? "",
        "raw": raw
      }

  events_parse:
    type: remap
    inputs: [router.events]
    source: |
      # First-party contract (docs/events.md): {event_name, ts, actor, properties{}, event_id?}
      del(.source_type)
      del(._path)
      del(.timestamp) # Vector receive time — exclude so retry payloads hash identically
      raw = encode_json(.)
      t, terr = parse_timestamp(to_string(.ts) ?? "", "%+")
      if terr != null { t = now() }
      name = to_string(.event_name) ?? "_invalid"
      if name == "" { name = "_invalid" }
      id = to_string(.event_id) ?? ""
      if id == "" { id = md5(raw) } # content hash: identical retries collapse, distinct events survive
      . = {
        "ts": format_timestamp!(t, "%F %T%.3f"),
        "event_id": id,
        "event_name": name,
        "actor": to_string(.actor) ?? "",
        "properties": encode_json(object(.properties) ?? {}),
        "raw": raw
      }

  mercury_accounts_parse:
    type: remap
    inputs: [router.mercury_acct]
    source: |
      # Poller sends pre-normalized fields; we only normalize timestamps to the
      # ClickHouse-friendly format (account number is already redacted upstream).
      del(.source_type)
      del(._path)
      ts_snap, e1 = parse_timestamp(to_string(.snapshot_ts) ?? "", "%+")
      if e1 != null { ts_snap = now() }
      .snapshot_ts = format_timestamp!(ts_snap, "%F %T%.3f")
      ts_cr, e2 = parse_timestamp(to_string(.created_at) ?? "", "%+")
      if e2 != null { ts_cr = ts_snap }
      .created_at = format_timestamp!(ts_cr, "%F %T%.3f")

  mercury_transactions_parse:
    type: remap
    inputs: [router.mercury_txn]
    source: |
      del(.source_type)
      del(._path)
      ts_cr, e1 = parse_timestamp(to_string(.created_at) ?? "", "%+")
      if e1 != null { ts_cr = now() }
      .created_at = format_timestamp!(ts_cr, "%F %T%.3f")
      ts_in, e2 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e2 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")
      # nullable settle-time columns: keep null while unknown/unparseable
      pa = .posted_at
      if pa == null || pa == "" {
        .posted_at = null
      } else {
        tp, ep = parse_timestamp(to_string(pa) ?? "", "%+")
        if ep != null { .posted_at = null } else { .posted_at = format_timestamp!(tp, "%F %T%.3f") }
      }
      ed = .estimated_delivery
      if ed == null || ed == "" {
        .estimated_delivery = null
      } else {
        eds = to_string(ed) ?? ""
        # Mercury sometimes sends a bare date; pad to a full instant so chrono parses it
        if match(eds, r'^\d{4}-\d{2}-\d{2}$') { eds = eds + "T00:00:00Z" }
        te, ee = parse_timestamp(eds, "%+")
        if ee != null { .estimated_delivery = null } else { .estimated_delivery = format_timestamp!(te, "%F %T%.3f") }
      }

  mercury_events_parse:
    type: remap
    inputs: [router.mercury_event]
    source: |
      # Webhook payload shape is provider-specific (Events API / JSON Merge Patch);
      # extract common identifiers defensively and keep the whole thing in raw.
      del(.source_type)
      del(._path)
      raw = encode_json(.)
      et = .createdAt
      if et == null { et = .timestamp }
      if et == null { et = .eventCreatedAt }
      t, terr = parse_timestamp(to_string(et) ?? "", "%+")
      if terr != null { t = now() }
      etype = .type
      if etype == null { etype = .eventType }
      txid = .transactionId
      if txid == null { txid = .transaction.id }
      if txid == null { txid = .id }
      acct = .accountId
      if acct == null { acct = .account.id }
      stat = .status
      if stat == null { stat = .transaction.status }
      . = {
        "received_at": format_timestamp!(now(), "%F %T%.3f"),
        "event_ts": format_timestamp!(t, "%F %T%.3f"),
        "event_type": to_string(etype) ?? "",
        "transaction_id": to_string(txid) ?? "",
        "account_id": to_string(acct) ?? "",
        "status": to_string(stat) ?? "",
        "raw": raw
      }

  github_issues_parse:
    type: remap
    inputs: [router.github_issue]
    source: |
      # Poller sends pre-normalized fields (mercury pattern); normalize the
      # timestamps to ClickHouse format, keep closed_at null while open.
      del(.source_type)
      del(._path)
      ts_cr, e1 = parse_timestamp(to_string(.created_at) ?? "", "%+")
      if e1 != null { ts_cr = now() }
      .created_at = format_timestamp!(ts_cr, "%F %T%.3f")
      ts_up, e2 = parse_timestamp(to_string(.updated_at) ?? "", "%+")
      if e2 != null { ts_up = ts_cr }
      .updated_at = format_timestamp!(ts_up, "%F %T%.3f")
      ts_in, e3 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e3 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")
      ca = .closed_at
      if ca == null || ca == "" {
        .closed_at = null
      } else {
        tc, ec = parse_timestamp(to_string(ca) ?? "", "%+")
        if ec != null { .closed_at = null } else { .closed_at = format_timestamp!(tc, "%F %T%.3f") }
      }

  github_pulls_parse:
    type: remap
    inputs: [router.github_pull]
    source: |
      del(.source_type)
      del(._path)
      ts_cr, e1 = parse_timestamp(to_string(.created_at) ?? "", "%+")
      if e1 != null { ts_cr = now() }
      .created_at = format_timestamp!(ts_cr, "%F %T%.3f")
      ts_up, e2 = parse_timestamp(to_string(.updated_at) ?? "", "%+")
      if e2 != null { ts_up = ts_cr }
      .updated_at = format_timestamp!(ts_up, "%F %T%.3f")
      ts_in, e3 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e3 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")
      # nullable lifecycle columns: null until closed / merged
      ca = .closed_at
      if ca == null || ca == "" {
        .closed_at = null
      } else {
        tc, ec = parse_timestamp(to_string(ca) ?? "", "%+")
        if ec != null { .closed_at = null } else { .closed_at = format_timestamp!(tc, "%F %T%.3f") }
      }
      ma = .merged_at
      if ma == null || ma == "" {
        .merged_at = null
      } else {
        tm, em = parse_timestamp(to_string(ma) ?? "", "%+")
        if em != null { .merged_at = null } else { .merged_at = format_timestamp!(tm, "%F %T%.3f") }
      }

  github_commits_parse:
    type: remap
    inputs: [router.github_commit]
    source: |
      del(.source_type)
      del(._path)
      ts_co, e1 = parse_timestamp(to_string(.committed_at) ?? "", "%+")
      if e1 != null { ts_co = now() }
      .committed_at = format_timestamp!(ts_co, "%F %T%.3f")
      ts_in, e2 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e2 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")

  github_comments_parse:
    type: remap
    inputs: [router.github_comment]
    source: |
      del(.source_type)
      del(._path)
      ts_cr, e1 = parse_timestamp(to_string(.created_at) ?? "", "%+")
      if e1 != null { ts_cr = now() }
      .created_at = format_timestamp!(ts_cr, "%F %T%.3f")
      ts_up, e2 = parse_timestamp(to_string(.updated_at) ?? "", "%+")
      if e2 != null { ts_up = ts_cr }
      .updated_at = format_timestamp!(ts_up, "%F %T%.3f")
      ts_in, e3 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e3 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")

  monarch_accounts_parse:
    type: remap
    inputs: [router.monarch_acct]
    source: |
      # Poller sends pre-normalized fields; normalize timestamps to the
      # ClickHouse-friendly format (no full account number exists in the source).
      del(.source_type)
      del(._path)
      ts_snap, e1 = parse_timestamp(to_string(.snapshot_ts) ?? "", "%+")
      if e1 != null { ts_snap = now() }
      .snapshot_ts = format_timestamp!(ts_snap, "%F %T%.3f")
      ts_cr, e2 = parse_timestamp(to_string(.created_at) ?? "", "%+")
      if e2 != null { ts_cr = ts_snap }
      .created_at = format_timestamp!(ts_cr, "%F %T%.3f")
      ts_up, e3 = parse_timestamp(to_string(.updated_at) ?? "", "%+")
      if e3 != null { ts_up = ts_snap }
      .updated_at = format_timestamp!(ts_up, "%F %T%.3f")

  monarch_networth_parse:
    type: remap
    inputs: [router.monarch_networth]
    source: |
      del(.source_type)
      del(._path)
      # Monarch sometimes returns a bare YYYY-MM; pad to first-of-month for Date
      dt = to_string(.date) ?? ""
      if match(dt, r'^\d{4}-\d{2}$') { dt = dt + "-01" }
      if !match(dt, r'^\d{4}-\d{2}-\d{2}') { dt = "1970-01-01" }
      .date = slice!(dt, 0, 10)
      ts_in, e1 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e1 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")

  monarch_transactions_parse:
    type: remap
    inputs: [router.monarch_txn]
    source: |
      del(.source_type)
      del(._path)
      dt = to_string(.date) ?? ""
      if match(dt, r'^\d{4}-\d{2}$') { dt = dt + "-01" }
      if !match(dt, r'^\d{4}-\d{2}-\d{2}') { dt = "1970-01-01" }
      .date = slice!(dt, 0, 10)
      ts_cr, e1 = parse_timestamp(to_string(.created_at) ?? "", "%+")
      if e1 != null { ts_cr = now() }
      .created_at = format_timestamp!(ts_cr, "%F %T%.3f")
      ts_up, e2 = parse_timestamp(to_string(.updated_at) ?? "", "%+")
      if e2 != null { ts_up = ts_cr }
      .updated_at = format_timestamp!(ts_up, "%F %T%.3f")
      ts_in, e3 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e3 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")

  monarch_budgets_parse:
    type: remap
    inputs: [router.monarch_budget]
    source: |
      del(.source_type)
      del(._path)
      m = to_string(.month) ?? ""
      if match(m, r'^\d{4}-\d{2}$') { m = m + "-01" }
      if !match(m, r'^\d{4}-\d{2}-\d{2}') { m = "1970-01-01" }
      .month = slice!(m, 0, 10)
      ts_in, e1 = parse_timestamp(to_string(.ingested_at) ?? "", "%+")
      if e1 != null { ts_in = now() }
      .ingested_at = format_timestamp!(ts_in, "%F %T%.3f")

  monarch_holdings_parse:
    type: remap
    inputs: [router.monarch_holding]
    source: |
      del(.source_type)
      del(._path)
      ts_snap, e1 = parse_timestamp(to_string(.snapshot_ts) ?? "", "%+")
      if e1 != null { ts_snap = now() }
      .snapshot_ts = format_timestamp!(ts_snap, "%F %T%.3f")

  heartbeat_parse:
    type: remap
    inputs: [router.heartbeat]
    source: |
      # Poller liveness beats (slack-listener/pg-mirror insert directly; the
      # pollers hold no ClickHouse creds, so their beats route through here).
      # beat_at is stamped HERE, not by the sender — a beat delayed in a buffer
      # must not claim the pipeline was alive at flush time.
      del(.source_type)
      del(._path)
      . = {
        "connector": to_string(.connector) ?? "unknown",
        "beat_at": format_timestamp!(now(), "%F %T%.3f"),
        "detail": to_string(.detail) ?? ""
      }

  to_raw:
    type: remap
    inputs: [router._unmatched]
    source: |
      p = del(._path)
      if !is_string(p) { p = "/ingest" }
      raw = encode_json(.)
      . = {}
      .ingested_at = format_timestamp!(now(), "%F %T")
      .source_path = p
      .raw = raw

sinks:
  lake_vercel:
    type: clickhouse
    inputs: [vercel_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: logs_vercel
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 } # archival latency is cheap; tiny per-second inserts breed MergeTree parts
    buffer: { type: disk, max_size: 1073741824, when_full: drop_newest }

  lake_render:
    type: clickhouse
    inputs: [render_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: logs_render
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 1073741824, when_full: drop_newest }

  lake_events:
    type: clickhouse
    inputs: [events_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: app_events
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 2147483648, when_full: block } # never shed events (I4)

  lake_mercury_accounts:
    type: clickhouse
    inputs: [mercury_accounts_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: mercury_accounts
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: block } # financial data: never shed

  lake_mercury_transactions:
    type: clickhouse
    inputs: [mercury_transactions_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: mercury_transactions
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 1073741824, when_full: block }

  lake_mercury_events:
    type: clickhouse
    inputs: [mercury_events_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: mercury_events
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: drop_newest } # re-pollable — see lake_github_issues

  lake_github_issues:
    type: clickhouse
    inputs: [github_issues_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: github_issues
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    # drop_newest, not block: github data is re-pollable (the poller re-emits
    # from its cursor), and a blocked sink here would backpressure the shared
    # ingest_http source — stalling first-party app_events to protect data we
    # can simply re-fetch. Same reasoning as the platform-log sinks (see header).
    buffer: { type: disk, max_size: 536870912, when_full: drop_newest }

  lake_github_pulls:
    type: clickhouse
    inputs: [github_pulls_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: github_pulls
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: drop_newest } # re-pollable — see lake_github_issues

  lake_github_commits:
    type: clickhouse
    inputs: [github_commits_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: github_commits
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: drop_newest } # re-pollable — see lake_github_issues

  lake_github_comments:
    type: clickhouse
    inputs: [github_comments_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: github_comments
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: drop_newest } # re-pollable — see lake_github_issues

  lake_monarch_accounts:
    type: clickhouse
    inputs: [monarch_accounts_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: monarch_accounts
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: block } # financial data: never shed

  lake_monarch_net_worth:
    type: clickhouse
    inputs: [monarch_networth_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: monarch_net_worth
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: block }

