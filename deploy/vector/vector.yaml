    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    buffer: { type: disk, max_size: 536870912, when_full: block }

  lake_heartbeats:
    type: clickhouse
    inputs: [heartbeat_parse]
    endpoint: http://clickhouse:8123
    database: setoku
    table: ingest_heartbeats
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    # beats are a point-in-time liveness signal: flush fast (the Sources page's
    # "flowing" window is 10 minutes) and shed under pressure — a lost beat is
    # re-emitted next tick, and buffering one would backdate it anyway
    batch: { timeout_secs: 5, max_events: 100 }
    buffer: { type: memory, max_events: 500, when_full: drop_newest }

  lake_raw:
    type: clickhouse
    inputs: [to_raw]
    endpoint: http://clickhouse:8123
    database: setoku
    table: ingest_raw
    auth: { strategy: basic, user: "${CLICKHOUSE_USER}", password: "${CLICKHOUSE_PASSWORD}" }
    compression: gzip
    batch: { timeout_secs: 10, max_events: 10000 }
    # block, not drop_newest: the catch-all also receives first-party events
    # on mistyped paths — "nothing is silently dropped" must hold here (I4)
    buffer: { type: disk, max_size: 1073741824, when_full: block }
